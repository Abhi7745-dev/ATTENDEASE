<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role</title>

    <link rel="stylesheet" href="role-select.css">

    <!-- icons -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

</head>
<body>

    <div class="container">

        <div class="card">

            <h1>AttendEase</h1>
            <p>Select your role to continue</p>

            <div class="roles">

                <!-- Student -->
                <div class="role-box">
                    <i class="fa-solid fa-user-graduate"></i>

                    <h2>Student</h2>

                    <p>
                        Mark attendance and view records
                    </p>

                    <button onclick="window.location.href='/student-login'">
                        Continue
                    </button>
                </div>

                <!-- Professor -->
                <div class="role-box">
                    <i class="fa-solid fa-chalkboard-user"></i>

                    <h2>Professor</h2>

                    <p>
                        Generate QR and manage sessions
                    </p>

                    <button onclick="window.location.href='/professor-login'">
                        Continue
                    </button>
                </div>

                <!-- Admin -->
                <div class="role-box">
                    <i class="fa-solid fa-user-shield"></i>

                    <h2>Admin</h2>

                    <p>
                        Manage users and attendance system
                    </p>

                    <button onclick="window.location.href='/admin-login'">
                        Continue
                    </button>
                </div>

            </div>

        </div>

    </div>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

    background:
    linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

}

.container{

    width:100%;

    max-width:1200px;

}

.card{

    width:100%;

    padding:50px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 20px 45px rgba(0,0,0,.35);

    text-align:center;

}

.card h1{

    color:#ffffff;

    font-size:48px;

    margin-bottom:10px;

}

.card p{

    color:#d1d5db;

    margin-bottom:45px;

    font-size:17px;

}

.roles{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:30px;

}

.role-box{

    background:
    rgba(255,255,255,.07);

    border:1px solid rgba(255,255,255,.12);

    border-radius:20px;

    padding:35px 25px;

    transition:.35s;

}

.role-box:hover{

    transform:
    translateY(-10px);

    border-color:#22c55e;

    box-shadow:
    0 20px 35px rgba(34,197,94,.18);

}

.role-box i{

    font-size:65px;

    color:#22c55e;

    margin-bottom:20px;

}

.role-box h2{

    color:white;

    margin-bottom:15px;

    font-size:28px;

}

.role-box p{

    color:#cbd5e1;

    line-height:1.7;

    margin-bottom:30px;

    font-size:15px;

}

.role-box button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(135deg,#22c55e,#16a34a);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.role-box button:hover{

    transform:scale(1.03);

    box-shadow:
    0 12px 25px rgba(34,197,94,.35);

}

@media(max-width:768px){

    .card{

        padding:30px 20px;

    }

    .card h1{

        font-size:36px;

    }

}
</style>

</body>
</html>
