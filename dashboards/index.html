<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role</title>

    <link rel="stylesheet" href="role-select.css">

    <!-- icons -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

</head>
<body>

    <div class="container">

        <div class="card">

            <h1>AttendEase</h1>
            <p>Select your role to continue</p>

            <div class="roles">

                <!-- Student -->
                <div class="role-box">
                    <i class="fa-solid fa-user-graduate"></i>

                    <h2>Student</h2>

                    <p>
                        Mark attendance and view records
                    </p>

                    <button onclick="window.location.href='/student-login'">
                        Continue
                    </button>
                </div>

                <!-- Professor -->
                <div class="role-box">
                    <i class="fa-solid fa-chalkboard-user"></i>

                    <h2>Professor</h2>

                    <p>
                        Generate QR and manage sessions
                    </p>

                    <button onclick="window.location.href='/professor-login'">
                        Continue
                    </button>
                </div>

                <!-- Admin -->
                <div class="role-box">
                    <i class="fa-solid fa-user-shield"></i>

                    <h2>Admin</h2>

                    <p>
                        Manage users and attendance system
                    </p>

                    <button onclick="window.location.href='/admin-login'">
                        Continue
                    </button>
                </div>

            </div>

        </div>

    </div>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background:
        radial-gradient(circle at top right, rgba(0,229,153,0.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(0,229,153,0.08), transparent 35%),
        #0a0c0f;

    color:#f0f2f5;

}

.container{

    width:100%;

    max-width:1200px;

}

.card{

    background:#111318;

    border-radius:22px;

    padding:45px;

    border:1px solid rgba(0,229,153,0.15);

    box-shadow:
        0 15px 40px rgba(0,0,0,0.5),
        0 0 30px rgba(0,229,153,0.08);

    backdrop-filter:blur(12px);

    text-align:center;

}

.card::before{

    content:"";

    display:block;

    width:80px;

    height:5px;

    margin:0 auto 25px;

    border-radius:50px;

    background:linear-gradient(
        90deg,
        #00e599,
        #00ffb3
    );

}

.card h1{

    color:#00e599;

    font-size:42px;

    margin-bottom:10px;

}

.card p{

    color:#9ca3af;

    font-size:16px;

    margin-bottom:40px;

}

.roles{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

    gap:25px;

}

.role-box{

    background:#181b22;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:18px;

    padding:35px 25px;

    transition:.3s;

}

.role-box:hover{

    transform:translateY(-8px);

    border-color:#00e599;

    box-shadow:
        0 12px 30px rgba(0,229,153,.15);

}

.role-box i{

    font-size:60px;

    color:#00e599;

    margin-bottom:20px;

}

.role-box h2{

    color:#ffffff;

    margin-bottom:12px;

    font-size:26px;

}

.role-box p{

    color:#9ca3af;

    line-height:1.6;

    margin-bottom:25px;

}

.role-box button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        90deg,
        #00e599,
        #00ffb3
    );

    color:#0a0c0f;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;

}

.role-box button:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(0,229,153,.25);

}

@media(max-width:768px){

    .card{

        padding:30px 20px;

    }

    .card h1{

        font-size:34px;

    }

    .roles{

        grid-template-columns:1fr;

    }

}
</style>

</body>
</html>
